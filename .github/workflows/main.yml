name: Build Proton Drive APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ProtonDriveApps/android-drive
          ref: '2.39.0'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        run: ./gradlew assembleProdDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: proton-drive-apk
          path: app/build/outputs/apk/prod/debug/*.apk
